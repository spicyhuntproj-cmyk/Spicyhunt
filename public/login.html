<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Login | Spicy Hunt</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 60px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 40px 100px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }
        .login-panel::before {
            content: '';
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 30px;
            pointer-events: none;
        }
        .form-control-royal {
            background: #FFFBF0;
            border: 1px solid rgba(139, 0, 0, 0.1);
            border-radius: 50px;
            padding: 15px 25px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-control-royal:focus {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            border-color: var(--gold-accent);
            background: white;
        }
    </style>
</head>
<body style="background: linear-gradient(rgba(18, 0, 0, 0.5), rgba(18, 0, 0, 0.7)), url('spiced_interior_hero_1_1775318417656.png') center/cover fixed;">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark position-absolute w-100" style="z-index: 1000; background: transparent !important;">
        <div class="container">
            <a class="navbar-brand brand-logo fs-3" href="index.html" style="color:white !important;">SPIĆY HUNT</a>
        </div>
    </nav>

    <!-- Login Container -->
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="row w-100 justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="login-panel reveal visible" style="opacity: 1; transform: translateY(0);">
                    <div id="login-section">
                        <div class="text-center mb-5">
                            <img src="royal_crest_gold.png" alt="Royal Crest" style="width: 80px; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));" class="mb-4">
                            <h2 class="brand-logo fs-2" style="color: var(--primary-color);">GUEST LOGIN</h2>
                            <p class="text-muted small">ENTER THE ROYAL CULINARY ARCHIVE</p>
                        </div>

                        <form id="login-form">
                            <div class="mb-4">
                                <label class="form-label text-uppercase small fw-bold">Royal Email</label>
                                <input type="email" id="login-email" class="form-control form-control-royal" placeholder="your@email.com" required>
                            </div>
                            <div class="mb-5">
                                <label class="form-label text-uppercase small fw-bold">Secret Key</label>
                                <input type="password" id="login-password" class="form-control form-control-royal" placeholder="••••••••" required>
                            </div>
                            
                            <div class="text-center mb-4">
                                <button type="submit" id="login-submit" class="btn btn-primary-custom w-100 py-3 rounded-pill fs-6 position-relative">
                                    <span class="btn-text">Sign In to Feast</span>
                                    <div class="spinner-border spinner-border-sm position-absolute d-none" style="top:35%; right:20px;"></div>
                                </button>
                            </div>
                            
                            <div class="text-center">
                                <p class="text-muted small">
                                    New to the Hunt? <a href="#" onclick="toggleAuth(event)" class="text-decoration-none fw-bold" style="color: var(--accent-color);">Request Access</a>
                                </p>
                            </div>
                        </form>
                    </div>

                    <!-- Registration Section (Hidden by Default) -->
                    <div id="register-section" style="display: none;">
                        <div class="text-center mb-5">
                            <img src="royal_crest_gold.png" alt="Royal Crest" style="width: 80px; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));" class="mb-4">
                            <h2 class="brand-logo fs-2" style="color: var(--primary-color);">REQUEST ACCESS</h2>
                            <p class="text-muted small">JOIN THE ROYAL CULINARY LEGACY</p>
                        </div>

                        <form id="register-form">
                            <div class="mb-4">
                                <label class="form-label text-uppercase small fw-bold">Full Name</label>
                                <input type="text" id="reg-name" class="form-control form-control-royal" placeholder="His Highness Arjun Singh" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-uppercase small fw-bold">Royal Email</label>
                                <input type="email" id="reg-email" class="form-control form-control-royal" placeholder="your@email.com" required>
                            </div>
                            <div class="mb-5">
                                <label class="form-label text-uppercase small fw-bold">Secret Key</label>
                                <input type="password" id="reg-password" class="form-control form-control-royal" placeholder="Assign a password" required>
                            </div>
                            
                            <div class="text-center mb-4">
                                <button type="submit" id="register-submit" class="btn btn-primary-custom w-100 py-3 rounded-pill fs-6 position-relative">
                                    <span class="btn-text">Submit Request</span>
                                    <div class="spinner-border spinner-border-sm position-absolute d-none" style="top:35%; right:20px;"></div>
                                </button>
                            </div>
                            
                            <div class="text-center">
                                <p class="text-muted small">
                                    Already a Member? <a href="#" onclick="toggleAuth(event)" class="text-decoration-none fw-bold" style="color: var(--accent-color);">Sign In</a>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Use app.js for real auth logic -->
    <script src="app.js"></script>
    <script>
        function toggleAuth(e) {
            e.preventDefault();
            const loginSection = document.getElementById('login-section');
            const registerSection = document.getElementById('register-section');
            if(loginSection.style.display === 'none') {
                loginSection.style.display = 'block';
                registerSection.style.display = 'none';
            } else {
                loginSection.style.display = 'none';
                registerSection.style.display = 'block';
            }
        }
    </script>
</body>
</html>
