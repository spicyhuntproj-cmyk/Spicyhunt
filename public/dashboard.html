<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Royal Dashboard | Spicy Hunt</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Specific Dashboard Styling -->
    <style>
        .dashboard-header {
            margin-top: 100px; /* Push below unified navbar */
        }
        .dash-card {
            background: white;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            padding: 25px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }
        .dash-card:hover {
            box-shadow: 0 15px 50px rgba(139, 0, 0, 0.1);
        }
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-confirmed, .status-preparing { background: #d4edda; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <!-- Unified Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark position-absolute w-100" style="z-index: 1000; background: var(--primary-color) !important;">
        <div class="container">
            <a class="navbar-brand brand-logo fs-3" href="index.html" style="color:white !important;">SPIĆY HUNT</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-4">
                    <li class="nav-item"><a class="nav-link text-white fw-bold" href="menu.html">The Royal Menu</a></li>
                    <li class="nav-item"><a class="nav-link text-white fw-bold" href="booking.html">Reserve a Table</a></li>
                    <li class="nav-item" id="auth-nav-item">
                        <!-- Authenticated dropdown handled in app.js -->
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="container pb-5 dashboard-header">
        
        <div class="text-center mb-5">
            <h1 class="brand-logo" style="color: var(--primary-color);">ROYAL COMMAND.</h1>
            <p class="text-muted">MANAGE YOUR TABLES & FEASTS</p>
        </div>

        <div class="row">
            <!-- Table Reservations Column -->
            <div class="col-lg-6 mb-4">
                <div class="menu-structure-panel p-4 mt-0">
                    <h3 class="brand-logo mb-4" style="color: var(--accent-color); letter-spacing: 2px !important;">Upcoming Feasts</h3>
                    <div id="reservations-container">
                        <!-- Loaded dynamically -->
                        <div class="text-center text-muted py-5">Summoning Records...</div>
                    </div>
                </div>
            </div>

            <!-- Culinary Orders Column -->
            <div class="col-lg-6 mb-4">
                <div class="menu-structure-panel p-4 mt-0">
                    <h3 class="brand-logo mb-4" style="color: var(--accent-color); letter-spacing: 2px !important;">Culinary History</h3>
                    <div id="orders-container">
                        <!-- Loaded dynamically -->
                        <div class="text-center text-muted py-5">Summoning Records...</div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if(!token) {
                alert("Please log in to view your dashboard.");
                window.location.href = 'login.html';
                return;
            }
            loadDashboardData();
        });
    </script>
</body>
</html>
